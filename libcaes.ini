[project]
description: "libcaes is a library to support cross-platform AES encryption."
name: "libcaes"
status: "alpha"
year_of_creation: "2011"
features: ["ossfuzz", "python_bindings"]

[library]
build_dependencies: ["crypto"]
description: "Library to support cross-platform AES encryption"
public_types: ["context", "tweaked_context"]
tests: ["context", "crypt_cbc", "crypt_ccm", "crypt_ecb", "crypt_xts", "error", "support", "tweaked_context"]

[python_module]
tests: ["context", "crypt_cbc", "crypt_ccm", "crypt_ecb", "crypt_xts", "error", "support", "tweaked_context"]

[tests]
profiles: ["libcaes", "pycaes"]

[appveyor]
allow_failures: ["vs2022-vsdebug"]
